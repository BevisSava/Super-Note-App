version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: note_app
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    command: sh -c "composer install && apache2-foreground"
    depends_on:
      - db

  websocket:
    build:
      context: ./backend
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    command: sh -c "composer install && php socket_server.php"
    depends_on:
      - db

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "80:5173"
    env_file:
      - ./frontend/.env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
